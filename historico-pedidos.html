<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de Pedidos — Solicitud de Pedidos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="nav-principal"></nav>

  <main class="panel-container panel-container-ancho historico-container">
    <div class="panel-marca">
      <img src="assets/logo-casmer.png" alt="CASMER - FEPREMI" class="logo-casmer">
    </div>

    <header class="historico-header">
      <div class="historico-header-titulo">
        <h1>HISTÓRICO DE PEDIDOS</h1>
        <p class="panel-subtitulo">Consulta y gestión del historial de pedidos realizados</p>
      </div>
      <button type="button" id="btnExportarExcel" class="btn-exportar-excel">
        <span class="btn-exportar-icono" aria-hidden="true">📊</span> Exportar a Excel
      </button>
    </header>

    <section class="historico-filtros">
      <h2 class="historico-seccion-titulo">FILTROS DE BÚSQUEDA</h2>
      <form id="formFiltrosHistorico" class="historico-filtros-grid">
        <div class="field-group">
          <label for="filtroFechaDesde">Fecha desde</label>
          <input type="date" id="filtroFechaDesde" name="fechaDesde">
        </div>
        <div class="field-group">
          <label for="filtroFechaHasta">Fecha hasta</label>
          <input type="date" id="filtroFechaHasta" name="fechaHasta">
        </div>
        <div class="field-group">
          <label for="filtroSector">Sector solicitante</label>
          <select id="filtroSector" name="sector">
            <option value="">Todos los sectores</option>
          </select>
        </div>
        <div class="field-group">
          <label for="filtroTipo">Tipo de pedido</label>
          <select id="filtroTipo" name="tipo">
            <option value="">Todos los tipos</option>
          </select>
        </div>
        <div class="field-group">
          <label for="filtroEstado">Estado</label>
          <select id="filtroEstado" name="estado">
            <option value="">Todos los estados</option>
            <option value="finalizado">Completado</option>
            <option value="autorizado">Parcial</option>
            <option value="pendiente">Pendiente</option>
            <option value="rechazado">Rechazado</option>
          </select>
        </div>
        <div class="field-group">
          <label for="filtroNumero">Número de pedido</label>
          <input type="text" id="filtroNumero" name="numero" placeholder="Ej: 00001">
        </div>

        <details class="historico-filtros-avanzados field-full">
          <summary>Filtros avanzados</summary>
          <div class="historico-avanzados-grid">
            <div class="field-group">
              <label for="filtroSolicitante">Solicitante</label>
              <input type="text" id="filtroSolicitante" name="solicitante" placeholder="Nombre del solicitante">
            </div>
            <div class="field-group">
              <label for="filtroOrdenador">Ordenador</label>
              <select id="filtroOrdenador" name="ordenador">
                <option value="">Todos los ordenadores</option>
                <option value="gerencia">Gerencia</option>
                <option value="direccion_tecnica">Dirección Técnica</option>
                <option value="consejo_directivo">Consejo Directivo</option>
              </select>
            </div>
            <div class="field-group">
              <label for="filtroComprador">Comprador</label>
              <select id="filtroComprador" name="comprador">
                <option value="">Todos los compradores</option>
                <option value="__sin_asignar__">Sin asignar</option>
              </select>
            </div>
            <div class="field-group field-check">
              <label><input type="checkbox" id="filtroSoloUrgente" name="soloUrgente"> Solo con ítems urgentes</label>
            </div>
          </div>
        </details>

        <div class="historico-filtros-acciones field-full">
          <button type="button" id="btnLimpiarFiltros" class="btn-secundario">
            <span aria-hidden="true">↺</span> Limpiar filtros
          </button>
          <button type="submit" class="btn-buscar-historico">
            <span aria-hidden="true">🔍</span> Buscar
          </button>
        </div>
      </form>
    </section>

    <section id="resumenHistorico" class="historico-resumen"></section>

    <section class="historico-resultados">
      <div class="historico-resultados-header">
        <h2 class="historico-seccion-titulo" id="tituloResultados">RESULTADOS</h2>
        <div class="historico-paginacion-top" id="paginacionTop"></div>
      </div>
      <div id="tablaHistorico" class="historico-tabla-contenedor"></div>
      <div class="historico-paginacion-bottom" id="paginacionBottom"></div>
    </section>
  </main>

  <div id="modalDetalleHistorico" class="modal-overlay">
    <div class="modal-contenido modal-grande">
      <button type="button" class="modal-cerrar" data-cerrar-modal="modalDetalleHistorico">&times;</button>
      <div id="detalleHistoricoContenido"></div>
    </div>
  </div>

  <div id="modalEditarHistorico" class="modal-overlay">
    <div class="modal-contenido modal-grande">
      <button type="button" class="modal-cerrar" data-cerrar-modal="modalEditarHistorico">&times;</button>
      <h2 id="editarHistoricoTitulo">Editar solicitud</h2>

      <div class="admin-form-grid">
        <div class="field-group">
          <label for="editHistSector">Sector</label>
          <select id="editHistSector"></select>
        </div>
        <div class="field-group">
          <label for="editHistSolicitante">Solicitante</label>
          <input type="text" id="editHistSolicitante">
        </div>
        <div class="field-group">
          <label for="editHistJefeSector">Jefe sector</label>
          <input type="text" id="editHistJefeSector">
        </div>
      </div>

      <div class="field-group">
        <label for="editHistJustificacion">Justificación pedido</label>
        <textarea id="editHistJustificacion" rows="2"></textarea>
      </div>

      <h3 class="subtitulo-tabla">Productos</h3>
      <div class="table-wrapper">
        <table class="admin-tabla">
          <thead>
            <tr><th>CÓD.</th><th>CANT.</th><th>DESCRIPCIÓN</th><th>REF.</th><th>Urgente</th><th></th></tr>
          </thead>
          <tbody id="editHistProductosBody"></tbody>
        </table>
      </div>
      <button type="button" id="btnAgregarFilaEditHist" class="btn-link">+ AGREGAR FILA</button>

      <div class="modal-acciones">
        <button type="button" id="btnGuardarEdicionHist" class="btn-enviar">Guardar cambios</button>
        <button type="button" class="btn-secundario" data-cerrar-modal="modalEditarHistorico">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/historico-pedidos.js"></script>
</body>
</html>
